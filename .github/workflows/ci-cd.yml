name: DevSecOps-Pipeline

on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Python version thora downgrade kiya Compatibility ke liye

      - name: Install Dependencies & Setup App
        run: |
          # Is version mein TimedJSONWebSignatureSerializer lazmi hota hai
          pip install itsdangerous==1.1.0 
          pip install werkzeug==2.0.3 # Flask compatibility fix
          pip install bandit pytest flask==2.0.1 flask-sqlalchemy flask-bcrypt flask-login flask-mail flask-wtf email_validator
          
          export SECRET_KEY="supersecretkey123"
          export SQLALCHEMY_DATABASE_URI="sqlite:///site.db"
          cd Python/Flask_Blog/11-Blueprints
          python3 -c "from flaskblog import create_app, db; app = create_app(); app.app_context().push(); db.create_all()"
          python3 run.py & 
          sleep 10

      - name: Run SAST Scan (Bandit)
        run: bandit -r ./Python/Flask_Blog/11-Blueprints -lll --exit-zero

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: ZAP Scan Action
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:5000'
          fail_action: true

name: DevSecOps-Pipeline

on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies & Test
        run: |
          pip install bandit pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pytest || echo "No tests found"

      - name: Run SAST Scan (Bandit)
        # Is command mein 'venv' aur 'Python-Unit-Testing' ko ignore kiya hai
        # Taake sirf aapka 11-Blueprints wala code scan ho
        run: bandit -r . -lll --exclude ./venv,./Python-Unit-Testing,./Generators

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Run DAST (ZAP Baseline Scan)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:5000'
          fail_action: true

      - name: Check for Critical Alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh api repos/${{ github.repository }}/code-scanning/alerts?state=open \
            --jq '[.[] | select(.rule.security_severity_level == "high" or .rule.security_severity_level == "critical")] | length')
          if [ "$count" -gt 0 ]; then
            echo "FAILURE: $count High/Critical vulnerabilities found."
            exit 1
          fi

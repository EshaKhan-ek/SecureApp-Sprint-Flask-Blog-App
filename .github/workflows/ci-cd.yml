name: DevSecOps-Pipeline

on:
  push:
    branches: [ "feature/ci-cd-pipeline", "main", "develop" ]
  pull_request:
    branches: [ "feature/ci-cd-pipeline", "main", "develop" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run SAST Scan
        run: bandit -r . -ll -ii

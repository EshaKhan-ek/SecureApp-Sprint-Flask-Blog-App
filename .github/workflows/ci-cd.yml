name: DevSecOps-Pipeline

on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required for CodeQL to upload results
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Optional: Add your 'pytest' command here if you have unit tests
      # - name: Run Unit Tests
      #   run: pytest

      - name: Run SAST Scan (Bandit)
        # We are explicitly excluding the venv and several sub-folders causing issues
        run: bandit -r . -ll -i -x ./venv,./Python-Unit-Testing,./Python,./Slicing,./Str_Repr,./String_Interpolation

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
